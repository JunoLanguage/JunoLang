version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"

    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Berlin
    
    open-pull-requests-limit: 5

    labels:
      - dependencies
      - automated

    commit-message:
      prefix: "deps"

    rebase-strategy: auto

    versioning-strategy: auto

    target-branch: master